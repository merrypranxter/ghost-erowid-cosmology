# Quick Reference: Weight Guidelines
weight_guide:
  "0.9-0.95": "Dominant element - defines the composition"
  "0.8-0.85": "Strong presence - major visual component"
  "0.7-0.75": "Supporting element - adds depth/context"
  "0.6-0.65": "Accent - subtle enhancement"
  "0.4-0.5": "Texture layer - adds detail without dominance"
