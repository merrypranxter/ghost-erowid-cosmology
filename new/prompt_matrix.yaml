# Prompt Matrix: AI Art Generation
# Weighted Syntax Structure for Midjourney/Stable Diffusion

# Base Weight Syntax: [concept:weight]
# Range: 0.0-1.0, default 0.5, boost to 0.9 for dominance

substance_profiles:
  dmt_breakthrough:
    base_weights:
      machine_elf: 0.9
      chrysanthemum_mandala: 0.85
      jewel_geometry: 0.8
      chromatic_aberration: 0.4
      more_real_than_real: 0.7
    negative_prompts:
      - "organic_decay"
      - "rust"
      - "low_resolution"
      - "earthly_gravity"
    parameters:
      stylize: 250
      chaos: 80
      weird: 300
      quality: 2
      stop: 95 # Before over-processing

  salvia_mechanical:
    base_weights:
      industrial_wheel: 0.9
      conveyor_belt: 0.85
      oxidized_copper: 0.7
      zipper_reality: 0.8
      flattening_2d: 0.6
    negative_prompts:
      - "organic_curves"
      - "soft_lighting"
      - "natural_colors"
      - "human_scale"
    parameters:
      stylize: 150
      chaos: 60
      weird: 400 # High weird for salvia
      quality: 1 # Lower quality = grittier

  deliriant_shadows:
    base_weights:
      hat_man: 0.8
      peripheral_shadows: 0.7
      dithered_alpha: 0.6
      phantom_cigarette: 0.4
      static_noise: 0.5
    negative_prompts:
      - "clear_focus"
      - "bright_colors"
      - "coherent_geometry"
      - "high_definition"
    parameters:
      stylize: 50
      chaos: 95
      weird: 200
      quality: 0.5 # Degraded quality on purpose

  dissociative_void:
    base_weights:
      grid_superstructure: 0.8
      point_source_consciousness: 0.7
      clinical_coldness: 0.6
      neon_blue_grid: 0.75
      tesseract_array: 0.65
    negative_prompts:
      - "warmth"
      - "organic_noise"
      - "human_emotion"
      - "natural_light"
    parameters:
      stylize: 100
      chaos: 40
      weird: 150

