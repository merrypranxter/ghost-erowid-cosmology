# Negative Prompts by Layer
# Use these subtractive terms to prevent bleed between cosmological layers

negative_prompts:
  dmt_waiting_room: >
    rust, decay, industrial machinery, earth tones, organic rot, heavy gravity,
    blurry, low resolution, flat lighting, human imperfections, mortality

  salvia_mechanical: >
    soft curves, warm colors, natural beauty, organic growth, fluid motion,
    biological warmth, fuzzy edges, romantic lighting, human emotion, compassion

  deliriant: >
    clear focus, high definition, coherent geometry, bright cheerful colors,
    symmetry, order, logic, clean lines, intentional composition, professional photography

  dissociative_void: >
    warmth, chaos, organic noise, human emotion, natural light, earth colors,
    passion, randomness, biological forms, warmth of life
